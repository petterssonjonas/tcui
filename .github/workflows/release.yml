name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to upload assets to"
        required: true

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    env:
      # Cross-compilation toolchain for aarch64-unknown-linux-gnu.
      CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
      CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: meta
        run: |
          echo "version=$(python3 - <<'PY'
          import tomllib
          with open('Cargo.toml', 'rb') as fh:
              cargo = tomllib.load(fh)
          print(cargo['package']['version'])
          PY
          )" >> "$GITHUB_OUTPUT"
      - run: rustup toolchain install 1.96.0 --profile minimal
      - run: rustup default 1.96.0
      - run: rustup target add aarch64-unknown-linux-gnu
      # Native C/C++ cross-compiler needed by the bundled SQLite, oniguruma,
      # and sqlite-vec build scripts when targeting aarch64.
      - run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
      # x86_64 release binary (used by the .deb amd64, .rpm, and x86 tarball).
      - run: cargo build --release
      # aarch64 release binary (used by the .deb arm64 and arm64 tarball).
      - run: cargo build --release --target aarch64-unknown-linux-gnu
      - run: cargo install cargo-deb cargo-generate-rpm
      - run: cargo deb --no-build --output target/release/tcui_${{ steps.meta.outputs.version }}_amd64.deb
      - run: cargo deb --no-build --target aarch64-unknown-linux-gnu --output target/release/tcui_${{ steps.meta.outputs.version }}_arm64.deb
      - run: cargo generate-rpm --output target/release/tcui-${{ steps.meta.outputs.version }}-1.x86_64.rpm
      - run: tar -C target/release -czf target/release/tcui-x86_64-unknown-linux-gnu.tar.gz tcui
      - run: tar -C target/aarch64-unknown-linux-gnu/release -czf target/release/tcui-aarch64-unknown-linux-gnu.tar.gz tcui
      - run: git archive --format=tar.gz --output target/release/tcui-${{ steps.meta.outputs.version }}-source.tar.gz HEAD
      - run: cp scripts/install.sh target/release/install.sh
      - run: cp LICENSE target/release/LICENSE
      - run: cp assets/models/potion-base-8M/LICENSE target/release/potion-base-8M-LICENSE
      - name: Generate release PKGBUILD from packaging/PKGBUILD
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          cp packaging/PKGBUILD target/release/PKGBUILD
          sed -i "s|^pkgver=.*|pkgver=${VERSION}|" target/release/PKGBUILD
      - run: |
          cd target/release
          # Extract binary checksums into PKGBUILD before checksumming it.
          X86_SUM="$(sha256sum tcui-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')"
          ARM_SUM="$(sha256sum tcui-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')"
          sed -i \
            -e "s|^sha256sums_x86_64=('[0-9a-f]*')|sha256sums_x86_64=('${X86_SUM}')|" \
            -e "s|^sha256sums_aarch64=('[0-9a-f]*')|sha256sums_aarch64=('${ARM_SUM}')|" \
            PKGBUILD
          sha256sum \
            tcui-x86_64-unknown-linux-gnu.tar.gz \
            tcui-aarch64-unknown-linux-gnu.tar.gz \
            tcui-${{ steps.meta.outputs.version }}-source.tar.gz \
            tcui_${{ steps.meta.outputs.version }}_amd64.deb \
            tcui_${{ steps.meta.outputs.version }}_arm64.deb \
            tcui-${{ steps.meta.outputs.version }}-1.x86_64.rpm \
            install.sh \
            LICENSE \
            potion-base-8M-LICENSE \
            PKGBUILD > SHA256SUMS
      - env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          gh release upload "${RELEASE_TAG}" \
            target/release/tcui-x86_64-unknown-linux-gnu.tar.gz \
            target/release/tcui-aarch64-unknown-linux-gnu.tar.gz \
            target/release/tcui-${{ steps.meta.outputs.version }}-source.tar.gz \
            target/release/tcui_${{ steps.meta.outputs.version }}_amd64.deb \
            target/release/tcui_${{ steps.meta.outputs.version }}_arm64.deb \
            target/release/tcui-${{ steps.meta.outputs.version }}-1.x86_64.rpm \
            target/release/install.sh \
            target/release/LICENSE \
            target/release/potion-base-8M-LICENSE \
            target/release/SHA256SUMS \
            target/release/PKGBUILD \
            --clobber